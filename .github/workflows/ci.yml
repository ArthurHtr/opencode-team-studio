name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: opencode-team-studio:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Docker Compose
        env:
          OPENCODE_HOST_CONFIG_DIR: /tmp/opencode-ci
          LOCAL_UID: "1000"
          LOCAL_GID: "1000"
          STUDIO_PORT: "3210"
          STUDIO_VERSION: "v0.1.0-alpha.1"
        run: |
          mkdir -p "$OPENCODE_HOST_CONFIG_DIR"
          docker compose --env-file <(printf 'OPENCODE_HOST_CONFIG_DIR=%s\nLOCAL_UID=%s\nLOCAL_GID=%s\nSTUDIO_PORT=%s\nSTUDIO_VERSION=%s\n' "$OPENCODE_HOST_CONFIG_DIR" "$LOCAL_UID" "$LOCAL_GID" "$STUDIO_PORT" "$STUDIO_VERSION") config
